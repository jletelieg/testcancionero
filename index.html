// Crea (o envía a revisión) una canción nueva, resolviendo parentId/versionLabel
// si el usuario indicó que es una versión de una canción existente.
async function finalizeNewSong(songObj, parentId, versionLabel){
  const obj=Object.assign({},songObj);
  if(parentId){
    const siblings=songVersions(parentId).length;
    obj.parent_song_id=parentId;
    obj.version_label=(versionLabel&&versionLabel.trim())?versionLabel.trim():("Versión "+(siblings+2));
  }
  if(isAdmin()){
    const row=Object.assign({},obj,{is_base:false,hidden:false,created_by:SESSION?.user.id||null});
    const {data,error}=await db.from("songs").insert(row).select().single();
    if(error){toast("Error al guardar: "+error.message);unlockSaveBtn();return;}
    SONGS[data.id]=data;
    logSongHistory(data.id, parentId?'version_added':'created', {title:data.title});
    STATE.editing=false; STATE.editTarget="song"; STATE.view="song"; STATE.songId=data.id; STATE.noCapo=false;
    toast(parentId?`Versión agregada: "${obj.version_label}"`:"Canción agregada"); render();
  } else {
    const row={kind:'manual', payload:[obj], collection_name:null, collection_key:null,
      submitted_by:SESSION.user.id, submitter_name:PROFILE?.display_name||SESSION.user.email?.split("@")[0]||null,
      submitter_email:SESSION.user.email||null, status:'pending'};
    const {error}=await db.from("pending_imports").insert(row);
    if(error){
      if(error.message&&(error.message.includes("pending_imports")||error.message.includes("schema cache")||error.message.includes("does not exist"))){
        toast("⚠ El administrador aún no habilitó la revisión de canciones nuevas. Usa 'Reportar' para enviarla por email.");
      } else { toast("Error al enviar: "+error.message); }
      unlockSaveBtn();
      return;
    }
    STATE.editing=false;
    if(parentId){ STATE.view="song"; STATE.songId=parentId; }
    else { STATE.view="list"; STATE.tab="library"; }
    await loadPendingImports();
    toast(parentId?"Tu versión quedó pendiente de revisión por el administrador.":"Tu canción quedó pendiente de revisión por el administrador.");
    render();
  }
}

// Panel de revisión de pendientes (solo admin)
function openPendingEditsPanel(){
  if(!isAdmin())return;
  if(PENDING_EDITS.length===0){
    openModal(`<div class="modal-head"><h3>Ediciones pendientes</h3>${closeBtn()}</div>
    <div class="modal-body"><div class="empty" style="padding:40px 0"><div class="big">Sin pendientes</div><div>No hay sugerencias de edición esperando revisión.</div></div></div>`);
    return;
  }
  let html=`<div class="modal-head"><h3>Ediciones pendientes <span class="pending-badge">${PENDING_EDITS.length}</span></h3>${closeBtn()}</div>
  <div class="modal-body">`;
  PENDING_EDITS.forEach(p=>{
    const s=SONGS[p.song_id]||{};
    const sTitle=s.title?s.title:"Canción desconocida";
    const date=p.created_at?new Date(p.created_at).toLocaleDateString("es-CL"):"";
    const by=p.submitter_name||"Usuario";
    const editData=p.edit_data||{};
    const diffHtml=buildPendingDiffHtml(s,editData);
    html+=`<div class="pending-rev-card">
      <div class="pending-rev-title">${esc(sTitle)}</div>
      <div class="pending-rev-meta">Sugerido por <b>${esc(by)}</b> · ${date}</div>
      <details style="margin-bottom:8px">
        <summary style="cursor:pointer;font-size:12.5px;font-weight:600;color:var(--indigo)">Ver cambios propuestos</summary>
        <div style="margin-top:8px;font-size:12.5px;color:var(--muted);line-height:1.5">
          ${diffHtml}
        </div>
      </details>
      <div class="pending-rev-actions">
        <button class="btn sm primary" data-approve="${esc(p.id)}" data-song="${esc(p.song_id)}">✓ Aprobar</button>
        <button class="btn sm" data-editpend="${esc(p.id)}" data-song="${esc(p.song_id)}">✎ Editar antes de aprobar</button>
        <button class="btn sm danger" data-reject="${esc(p.id)}">✕ Rechazar</button>
      </div>
    </div>`;
  });
  html+=`</div>`;
  openModal(html);

  document.querySelectorAll("[data-approve]").forEach(b=>b.onclick=async()=>{
    if(b.disabled)return; b.disabled=true;
    const pid=b.dataset.approve, sid=b.dataset.song;
    const pe=PENDING_EDITS.find(p=>String(p.id)===String(pid));
    if(!pe){b.disabled=false;return;}
    const songObj=pe.edit_data;
    const {error}=await db.from("songs").update({...songObj,updated_at:new Date().toISOString()}).eq("id",sid);
    if(error){toast("Error: "+error.message);b.disabled=false;return;}
    SONGS[sid]=Object.assign({},SONGS[sid],songObj);
    const {error:e2}=await db.from("pending_edits").update({status:"approved",reviewed_at:new Date().toISOString(),reviewed_by:SESSION.user.id}).eq("id",pid);
    if(e2){toast("Aprobado, pero no se pudo marcar como revisado: "+e2.message);}
    logSongHistory(sid,'edited',{title:songObj.title});
    createNotification(pe.submitted_by,'edit_approved','pending_edits',pe.id,`Tu sugerencia para "${SONGS[sid]?.title||songObj.title}" fue aprobada.`);
    PENDING_EDITS=PENDING_EDITS.filter(p=>String(p.id)!==String(pid));
    PENDING_COUNT=PENDING_EDITS.length;
    toast("Edición aprobada");
    render();
    closeModal();
    if(PENDING_EDITS.length)openPendingEditsPanel();
  });

  document.querySelectorAll("[data-editpend]").forEach(b=>b.onclick=()=>{
    const pid=b.dataset.editpend, sid=b.dataset.song;
    const pe=PENDING_EDITS.find(p=>String(p.id)===String(pid));
    if(!pe)return;
    closeModal();
    const s=SONGS[sid]||{};
    STATE.editing=true;
    STATE.editTarget="pending_approve";
    STATE.editPendingId=pid;
    STATE.songId=sid;
    STATE.view="song";
    STATE.editDraft={
      title:pe.edit_data.title||s.title||"",
      categorias:pe.edit_data.categorias||catsOf(s),
      liturgica:(pe.edit_data.liturgica===undefined?null:pe.edit_data.liturgica),
      coleccion:pe.edit_data.coleccion||collOf(s),
      credits:pe.edit_data.credits||s.credits||"",
      capo:+(pe.edit_data.capo||0),
      sections:JSON.parse(JSON.stringify(pe.edit_data.sections||s.sections||[[{lyric:"",chords:""}]]))
    };
    window.scrollTo(0,0);
    render();
  });

  document.querySelectorAll("[data-reject]").forEach(b=>b.onclick=async()=>{
    if(b.disabled)return; b.disabled=true;
    const pid=b.dataset.reject;
    const pe=PENDING_EDITS.find(p=>String(p.id)===String(pid));
    const note=(window.prompt("Motivo del rechazo (se mostrará a quien sugirió el cambio):")||"").trim();
    const {error}=await db.from("pending_edits").update({status:"rejected",review_note:note||null,reviewed_at:new Date().toISOString(),reviewed_by:SESSION.user.id}).eq("id",pid);
    if(error){toast("Error al rechazar: "+error.message);b.disabled=false;return;}
    if(pe)createNotification(pe.submitted_by,'edit_rejected','pending_edits',pe.id,`Tu sugerencia para "${SONGS[pe.song_id]?.title||"una canción"}" fue rechazada.${note?(' Motivo: '+note):''}`);
    PENDING_EDITS=PENDING_EDITS.filter(p=>String(p.id)!==String(pid));
    PENDING_COUNT=PENDING_EDITS.length;
    toast("Edición rechazada");
    render();
    closeModal();
    if(PENDING_EDITS.length)openPendingEditsPanel();
  });
}

// Botón "Volver al inicio" — mostrar/ocultar al hacer scroll
window.addEventListener("scroll",()=>{
  const btt=document.getElementById("backToTop");
  if(btt)btt.classList.toggle("show",window.scrollY>400);
  // Ocultar alpha bar en vista de canción
  const bar=document.getElementById("alphaBar");
  if(bar&&STATE.view!=="list")bar.classList.remove("show");
},{ passive:true });

document.getElementById("backToTop").onclick=()=>window.scrollTo({top:0,behavior:"smooth"});

// Mostrar "editar"/"sugerir" según rol (el texto del botón en la vista de canción)
// El botón #editBtn ya existe en renderSong; ajustamos su tooltip dinámicamente
// (lo manejamos directamente en el HTML del ribbon mediante la función que genera el tooltip)

// =================================================================
//  INIT
// =================================================================
async function init(){
  // loading splash
  $main.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:60vh;flex-direction:column;gap:16px;color:var(--muted)"><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="animation:spin 1s linear infinite"><path d="M12 2v4M12 18v4M4.9 4.9l2.8 2.8M16.3 16.3l2.8 2.8M2 12h4M18 12h4M4.9 19.1l2.8-2.8M16.3 7.7l2.8-2.8"/></svg><span>Cargando cancionero…</span></div>';
  applyTheme();
  // get session first
  const {data:{session}}=await db.auth.getSession();
  SESSION=session;
  if(SESSION){ await Promise.all([loadProfile(),loadPersonalState()]); }
  await loadSharedData();
  // (loadPendingEdits ya se llama dentro de loadProfile si hay sesión)
  applyTheme();
  updateAuthBtn();
  render();
  // listen for auth changes
  db.auth.onAuthStateChange(async(_ev,session)=>{
    SESSION=session;
    if(SESSION){ await Promise.all([loadProfile(),loadPersonalState()]); }
    else { PROFILE=null; LISTS=[]; FAVS=[]; TRANS={}; PREFS={theme:PREFS.theme,showChords:true,lyricSize:18,preferFlat:false,scrollSpeed:35,chordMode:"above"}; REP=freshRep(); STATE.editUnlocked=false; PENDING_EDITS=[]; PENDING_COUNT=0; MY_PENDING={}; PENDING_IMPORTS=[]; PENDING_IMPORT_COUNT=0; MY_PENDING_IMPORTS=[]; NOTIFICATIONS=[]; UNREAD_COUNT=0; }
    updateAuthBtn();
    render();
  });
  matchMedia("(prefers-color-scheme: dark)").addEventListener("change",()=>{if(!PREFS.theme)applyTheme()});
}
init();
</script>
