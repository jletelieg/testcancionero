uir la"},{"lyric":"forma litúrgica cuando se canta, que incluye alabanzas a las tres"},{"lyric":"personas de la Santísima Trinidad: Padre, Hijo y Espíritu Santo."}],[{"lyric":"Dice la IGMR:"}],[{"lyric":"«53. El Gloria es un himno antiquísimo y venerable con el"},{"lyric":"que la Iglesia, congregada en el Espíritu Santo, glorifica a Dios"},{"lyric":"Padre y glorifica y le suplica al Cordero. El texto de este himno"},{"lyric":"no puede cambiarse por otro. Lo inicia el sacerdote o, según las"},{"lyric":"circunstancias, el cantor o el coro, y en cambio, es cantado"},{"lyric":"simultáneamente por todos, o por el pueblo alternando con los"},{"lyric":"cantores, o por los mismos cantores. Si no se canta, lo dirán en"},{"lyric":"voz alta todos simultáneamente, o en dos coros que se responden"},{"lyric":"el uno al otro."}],[{"lyric":"Se canta o se dice en voz alta los domingos fuera de los"},{"lyric":"tiempos de Adviento y de Cuaresma, en las solemnidades y en las"},{"lyric":"fiestas, y en algunas celebraciones peculiares más solemnes»."}],[{"lyric":"Durante la octava de pascua, en que Cristo ya volvió de"},{"lyric":"entre los muertos, se canta (o reza) todos los días, para ensalzar"},{"lyric":"especialmente a Cristo resucitado. Dentro de las celebraciones"},{"lyric":"peculiares en que puede cantarse, está el matrimonio u otros"},{"lyric":"sacramentos."}]]},{"number":59,"title":"GLORIA A DIOS","categoria":"gloria","coleccion":"cancionero_cmp","sections":[[{"lyric":"Gloria a Dios en el cielo","chords":"LA RE LA"},{"lyric":"y en la tierra paz a los hombres","chords":"RE MI fa#m"},{"lyric":"que ama el Señor.","chords":"RE MI MI7"},{"lyric":"Gloria a Dios en el cielo","chords":"LA RE LA"},{"lyric":"Y en la tierra paz a los hombres","chords":"RE MI fa#m"},{"lyric":"Que ama el Señor.","chords":"RE MI LA"}],[{"lyric":"Gloria y honor sean dados","chords":"LA RE LA"},{"lyric":"al Padre y al Hijo","chords":"RE MI MI7"},{"lyric":"a Ti, Espíritu Santo","chords":"LA RE LA"},{"lyric":"por  inmensa gloria Te alabamos,","chords":"LA RE LA"},{"lyric":"Te bendecimos, Te adoramos,","chords":"sim MI LA"},{"lyric":"Te glorificamos, Te damos gracias.","chords":"do#m LA SI MI"}],[{"lyric":"Señor Dios Rey celestial, Dios Padre Todopoderoso,"},{"lyric":"Señor Hijo único, Jesucristo,"},{"lyric":"Señor Dios, Cordero de Dios, Hijo del Padre."}],[{"lyric":"Tú que quitas el pecado del mundo,"},{"lyric":"¡Ten piedad de nosotros!"},{"lyric":"Tú que quitas el pecado del mundo,"},{"lyric":"¡Atiende nuestra súplica!"},{"lyric":"Tú que estás sentado a la derecha del Padre,"},{"lyric":"¡Ten piedad de nosotros!"}],[{"lyric":"Porque sólo Tú eres Santo, sólo Tú Señor,"},{"lyric":"sólo Tú, Altísimo Jesucristo,"},{"lyric":"con el Espíritu Santo, en la Gloria de Dios Padre."},{"lyric":"Amen","chords":"RE MI LA"}],[{"lyric":"Los salmos son oraciones, cánticos de alabanza y loa a Dios,"},{"lyric":"compuestos en su mayoría por el Rey David, y que se cantan hace miles de"},{"lyric":"años. Son por tanto un patrimonio invaluable de nuestra Iglesia, integrado"},{"lyric":"por 150 cánticos que llevan siglos y siglos siendo rezados por los creyentes, y"},{"lyric":"transmitidos de generación en generación."}],[{"lyric":"Por ello, forman parte de nuestro Libro Sagrado: la Biblia. Todos los"},{"lyric":"días en la Santa Misa se lee uno de ellos, adaptado generalmente al tiempo"},{"lyric":"litúrgico y a las Lecturas del día."}],[{"lyric":"Si bien la mayor parte de ellos son de alabanza, también los hay de"},{"lyric":"súplica, de arrepentimiento. Pero todos son expresiones de admiración de lo"},{"lyric":"humano a lo divino, exclamando lo grande que es Dios, cuánto nos ama y"},{"lyric":"cuánto lo necesitamos."}],[{"lyric":"Muchos de ellos han sido adaptados y musicalizados de diversas"},{"lyric":"maneras durante la historia. Por lo mismo, al ser una de las expresiones más"},{"lyric":"genuinas y tradicionales de alabanza a Dios en nuestra fe, pueden cantarse,"},{"lyric":"no sólo en lugar de leerse durante la Eucaristía, sino que, en la Comunión,"},{"lyric":"Adoración al Santísimo, etc."}],[{"lyric":"La IGMR nos señala al respecto:"}],[{"lyric":"«61. Después de la primera lectura, sigue el salmo responsorial, que"},{"lyric":"es parte integral de la Liturgia de la Palabra y en sí mismo tiene gran"},{"lyric":"importancia litúrgica y pastoral, ya que favorece la meditación de la"},{"lyric":"Palabra de Dios (…)."}],[{"lyric":"Conviene que el salmo responsorial sea cantado, al menos la"},{"lyric":"respuesta que pertenece al pueblo (…) Si el salmo no puede cantarse, se"},{"lyric":"proclama de la manera más apta para facilitar la meditación de la Palabra"},{"lyric":"de Dios»."}]]},{"number":71,"title":"SALMO 3","categoria":"salmos","coleccion":"cancionero_cmp","sections":[[{"lyric":"(cejillo 3)"}],[{"lyric":"lam"},{"lyric":"//:Levántate, Señor, sálvame,","chords":"lam rem lam MI lam"},{"lyric":"Levántate, Señor, sálvame;","chords":"lam rem lam rem7 SOLsus4 SOL"},{"lyric":"No me dejes caer y líbrame del mal;","chords":"FA DO/MI rem MI7 lam LA/SI"},{"lyric":"Levántate, Señor, sálvame://","chords":"lam/do rem MI MI7 lam"}],[{"lyric":"No me dejes caer y líbrame del mal;","chords":"lam7/sol FA DO/MI rem rem/fa lam LA/SI"},{"lyric":"Levántate, Señor, sálvame.","chords":"lam/do rem MI MI7 lam"}]]},{"number":72,"title":"SALMO 4 (ME ENTREGAS CALMA)","categoria":"salmos","coleccion":"cancionero_cmp","sections":[[{"lyric":"Tú me entregas calma, Señor mi Dios","chords":"DO FA9/DO"},{"lyric":"Hoy por Ti puedo vivir","chords":"lam7 SOL"},{"lyric":"Tú me entregas calma, Señor mi Dios","chords":"DO FA9/DO"},{"lyric":"Hoy por Ti puedo vivir","chords":"lam SOL DO"}],[{"lyric":"Hasta cuando seguirán","chords":"DO SOL/SI lam"},{"lyric":"Mi Gloria ultrajarán","chords":"FA DO"},{"lyric":"Amarán la falsedad","chords":"SOL/SI lam SOL"}],[{"lyric":"La mentira buscarán"},{"lyric":"Tiemblen, dejen de pecar"},{"lyric":"Al Señor han de escuchar"}],[{"lyric":"Cuando Te llamo respóndeme, Señor", ulta oportuno, el"},{"lyric":"sacerdote y los fieles oran en silencio por algún intervalo de tiempo. Si se"},{"lyric":"quiere, la asamblea entera también puede cantar un salmo u otro canto de"},{"lyric":"alabanza o un himno»."}]]},{"number":192,"title":"A JESÚS                               (Cejillo III)","categoria":"comunion","coleccion":"cancionero_cmp","sections":[[{"lyric":"Oh mi Jesús maestro de mi vida,","chords":"SOL RE/FA# DO RE"},{"lyric":"¿que quiero ya sobre la tierra sino a Ti?,","chords":"SOL RE/FA# DO RE"},{"lyric":"¿qué puede el alma desear cuando ya ha gustado,","chords":"DO RE SOL RE/FA# mim mim/RE"},{"lyric":"las dulzuras de Vuestro amor?","chords":"DO lam7 RE"}],[{"lyric":"¿Podrá en la vida haber más dulce melodía,","chords":"SOL RE/FA# DO RE"},{"lyric":"que el tierno acento de Tu adorable voz?","chords":"SOL RE/FA# DO RE"},{"lyric":"No hermosura, pues nada basta al alma mía,","chords":"DO RE SOL RE/FA# mim mim/RE"},{"lyric":"fuera de Tu divino ser…","chords":"DO lam7 RE"}],[{"lyric":"Sumérgeme Jesús en este fuego de Tu Amor,","chords":"SOL sim7 DO RE"},{"lyric":"En tu amable Sagrado Corazón.","chords":"SOL sim7 DO RE"},{"lyric":"Ah mi Jesús venid muy pronto a arrebatarme,","chords":"SOL sim7 DO lam7 RE"},{"lyric":"Y que encuentre reposo sólo en Tu Corazón","chords":"SOL RE DO RE SOL"}],[{"lyric":"SOL RE sim7 SI7 mim DO SOL"},{"lyric":"RE#7dim mim mim/RE"},{"lyric":"LA/DO# RE MI7 sim7 MI"}],[{"lyric":"Allí escondida sin ya saber del mundo nada,","chords":"LA MI RE MI"},{"lyric":"quisiera morar por el resto de mi vida.","chords":"LA MI RE MI"},{"lyric":"Allí aprenderé lo que es amar, también gozar,","chords":"RE MI LA MI fa#m"},{"lyric":"y en el dolor, a hacer Tu voluntad","chords":"RE SI7 MI"}],[{"lyric":"Sumérgeme Jesús en este fuego de Tu Amor,","chords":"LA do#m RE MI"},{"lyric":"En tu amable Sagrado Corazón.","chords":"LA do#m RE MI"},{"lyric":"Ah mi Jesús venid muy pronto a arrebatarme,","chords":"LA do#m RE sim7 MI"},{"lyric":"Y que encuent // =================================================================
//  MOTOR DE ACORDES (notación latina)
// =================================================================
// Notación unificada (igual para todas las canciones, sin importar cómo se haya escrito el acorde original):
// Do# (no Reb) · Re · Mib (no Re#) · Mi · Fa · Fa# (no Solb) · Sol · Sol# (no Lab) · La · Sib/Bb (no Lab) · Si
const CANON=[["DO",""],["DO","#"],["RE",""],["MI","b"],["MI",""],["FA",""],["FA","#"],["SOL",""],["SOL","#"],["LA",""],["SI","b"],["SI",""]];
const PC={DO:0,"DO#":1,REb:1,RE:2,"RE#":3,MIb:3,MI:4,FA:5,"FA#":6,SOLb:6,SOL:7,"SOL#":8,LAb:8,LA:9,"LA#":10,SIb:10,SI:11,DOb:11,FAb:4,"MI#":5,"SI#":0};
const ROOT_RE=/^(SOL|DO|RE|MI|FA|LA|SI)([#b]?)(.*)$/i;
function noteToPc(root,acc){const k=root.toUpperCase()+(acc==="b"?"b":acc);return PC[k]!==undefined?PC[k]:null}
function applyCase(orig,base){
  if(orig===orig.toUpperCase())return base.toUpperCase();
  if(orig[0]===orig[0].toUpperCase())return base[0].toUpperCase()+base.slice(1).toLowerCase();
  return base.toLowerCase();
}
function transSeg(seg,shift,flat){
  const m=seg.match(ROOT_RE); if(!m)return seg;
  const root=m[1],acc=m[2],rest=m[3];
  const pc=noteToPc(root,acc); if(pc===null)return seg;
  const np=(((pc+shift)%12)+12)%12;
  const base=CANON[np][0], nacc=CANON[np][1];
  return applyCase(root,base)+nacc+rest;
}
function transChord(tok,shift,globalFlat){
  if(!tok)return tok;
  const flat = globalFlat || (tok.includes("b") && !tok.includes("#"));
  return tok.split("/").map(s=>transSeg(s,shift,flat)).join("/");
}
function transLine(chords,shift,globalFlat){
  if(!chords)return chords;
  if(!shift && !globalFlat) return chords;
  return chords.split(/(\s+)/).map(t=>/\s/.test(t)?t:transChord(t,shift,globalFlat)).join("");
}
// estado de un token de acorde: 'ok' (se reconoce), 'bad' (tiene letras pero no parsea), 'neutral' (símbolos: | - %)
function chordTokenStatus(tok){
  const t=(tok||"").trim(); if(!t) return "neutral";
  if(!/[A-Za-z]/.test(t)) return "neutral";
  for(const seg of t.split("/")){
    const m=seg.match(ROOT_RE);
    if(!m) return "bad";
    if(noteToPc(m[1],m[2])===null) return "bad";
  }
  return "ok";
}
function lineHasBadChord(chords){
  if(!chords) return false;
  return chords.split(/\s+/).some(t=>chordTokenStatus(t)==="bad");
}
function songHasBadChord(s){
  for(const sec of s.sections||[]) for(const ln of sec) if(lineHasBadChord(ln.chords)) return true;
  return false;
}
// HTML de una línea de acordes: transpone los reconocidos, marca en rojo los no reconocidos
function chordsHTML(chords,shift,flat){
  if(!chords) return "";
  return chords.split(/(\s+)/).map(t=>{
    // runs de espacios: se conserva UN espacio normal (punto de quiebre para que la línea
    // pueda envolver en pantallas angostas) y el resto como &nbsp; para no perder el alineado
    if(/^\s*$/.test(t)) return t.length<=1 ? t : " "+"&nbsp;".repeat(t.length-1);
    const st=chordTokenStatus(t);
    if(st==="bad") return `<span class="chord-bad" title="No se reconoce como acorde: no cambia de tono. Repórtalo o corrígelo.">${esc(t)}</span>`;
    if(st==="neutral") return esc(t);
    return esc(transChord(t,shift,flat));
  }).join("");
}

// =================================================================
//  BÚSQUEDA
// =================================================================
function norm(s){return (s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"")}
// índice de letra para búsqueda
// búsqueda dinámica sobre SONGS (no hay índice estático)
function songTitleText(id){ const s=effective(id); return norm(s?s.title||"":""); }
function songSearchText(id){
  const s=effective(id); if(!s) return "";
  let txt=s.title||"";
  for(const sec of s.sections||[]) for(const ln of sec) txt+=" "+(ln.lyric||"");
  return norm(txt);
}

// ---- Versiones de canciones ----
// Una canción "versión" tiene parent_song_id apuntando a la original.
// La original (o cualquier canción sin versiones) tiene parent_song_id=null.
function songVersions(baseId){
  return allIds().filter(id=>{ const s=SONGS[id]; return s && s.parent_song_id===baseId; });
}
function baseSongId(id){ const s=SONGS[id]; return (s&&s.parent_song_id)?s.parent_song_id:id; }
function isVersion(id){ const s=SONGS[id]; return !!(s&&s.parent_song_id); }
// texto de búsqueda agregando título/letra de todas las versiones (para que una
// búsqueda que solo calza en una versión igual encuentre la canción "familia")
function familySearchText(id){
  let txt=songSearchText(id);
  songVersions(id).forEach(vid=>{ txt+=" "+songSearchText(vid); });
  return txt;
}
function familyTitleMatches(id,q){
  if(songTitleText(id).includes(q)) return true;
  return songVersions(id).some(vid=>songTitleText(vid).includes(q));
}

// ---- Detección de duplicados (título normalizado + similitud de letra) ----
function bigrams(s){
  const out=[]; for(let i=0;i<s.length-1;i++) out.push(s.substr(i,2));
  return out;
}
function diceCoeff(a,b){
  a=a||""; b=b||"";
  if(!a||!b) return 0;
  if(a===b) return 1;
  const A=bigrams(a), B=bigrams(b);
  if(!A.length||!B.length) return 0;
  const mapB={}; B.forEach(g=>mapB[g]=(mapB[g]||0)+1);
  let inter=0;
  A.forEach(g=>{ if(mapB[g]>0){ inter++; mapB[g]--; } });
  return 2*inter/(A.length+B.length);
}
function songLyricNorm(sections){
  let t=""; (sections||[]).forEach(sec=>(sec||[]).forEach(ln=>t+=" "+(ln.lyric||"")));
  return norm(t);
}
// Busca la canción ya publicada más parecida a (title, sections). Solo compara
// contra originales (no contra otras versiones) para no ofrecer "versión de una versión".
// Umbral: título muy parecido (>=82%) basta solo, o un puntaje combinado >=55%.
function findDuplicateCandidate(title, sections){
  const nt=norm(title||"");
  const lyr=songLyricNorm(sections);
  let best=null;
  for(const id of allIds()){
    const s=SONGS[id]; if(!s || s.parent_song_id) continue;
    const ts=diceCoeff(nt, norm(s.title||""));
    const ls=diceCoeff(lyr, songLyricNorm(s.sections));
    const score=ts*0.6 + ls*0.4;
    if(ts>=0.82 || score>=0.55){
      if(!best || score>best.score) best={id, score, titleSim:ts, lyricSim:ls};
    }
  }
  return best;
}

function getActiveList(){

  const filtered = ids.filter(id=>{
    const s = effective(id);

      let okCat=false;
      for(const c of cats){
        if(c===LIT_TAG){ if(s.liturgica===true){okCat=true;break} }

      if(!okCat) return false;
    }
    if(colls.size && !colls.has(collOf(s))) return false;
    if(q && !(L?songSearchText(id):familySearchText(id)).includes(q)) return false;
    return true;
  });
  if(q){
    // primero las canciones cuyo título (o el de alguna versión) contiene la búsqueda
    return filtered.slice().sort((a,b)=>{
      const ta = (L?songTitleText(a).includes(q):familyTitleMatches(a,q)) ? 0 : 1;
      const tb = (L?songTitleText(b).includes(q):familyTitleMatches(b,q)) ? 0 : 1;
      return ta - tb;
    });
  }
  return filtered;
}

    <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">${visitedChip}${collPanel}</div>
  </div></div>`;

  // lista
  html += `<div class="list">`;
  if(ids.length===0){
    html += `<div class="empty"><div class="big">${inList?"Esta lista está vacía":"Nada por aquí"}</div>
      <div>${inList?"Abre una canción y agrégala a esta lista.":"Prueba con otra búsqueda o quita filtros."}</div></div>`;
  } else {
    let _lastLetter='';
  ids.forEach((id,idx)=>{
      const s = effective(id);
      const faved = FAVS.includes(id);

          <div class="song-sub">

  html += `</div>`;
  $main.innerHTML = html;

  renderAlphaBar(ids);
}

function attachLibraryEvents(){
  $main.querySelectorAll("[data-cat]").forEach(b=>b.onclick=()=>{
    const c=b.dataset.cat;
    if(STATE.cats.has(c))STATE.cats.delete(c); else STATE.cats.add(c);
    render();
  });
  // Botón "más visitadas"
  const vc=$main.querySelector("#visitedChip");
  if(vc)vc.onclick=()=>{STATE.topVisited=!STATE.topVisited;if(STATE.topVisited){STATE.cats.clear();STATE.colls.clear();}render()};
  // Filtro de colecciones (checklist)
  const cfBtn=$main.querySelector("#collFilterBtn");
  const cfPanel=$main.querySelector("#collPanel");
  if(cfBtn&&cfPanel){
    cfBtn.onclick=(e)=>{e.stopPropagation();cfPanel.classList.toggle("show");};
    const collAll=$main.querySelector("#collAll");
    if(collAll)collAll.onclick=()=>{STATE.colls.clear();STATE.topVisited=false;cfPanel.classList.remove("show");render()};
    $main.querySelectorAll("[data-colltog]").forEach(o=>o.onclick=()=>{
      const k=o.dataset.colltog;
      if(STATE.colls.has(k))STATE.colls.delete(k); else STATE.colls.add(k);
      STATE.topVisited=false;
      render();
    });
    document.addEventListener("click",(e)=>{if(!cfPanel.contains(e.target)&&e.target!==cfBtn)cfPanel.classList.remove("show");},{once:true});
  }
  $main.querySelectorAll("[data-open]").forEach(r=>r.onclick=(e)=>{
    if(e.target.closest("[data-fav],[data-addlist],[data-rmlist]"))return;
    openSong(parseId(r.dataset.open));
  });
  $main.querySelectorAll("[data-fav]").forEach(b=>b.onclick=e=>{e.stopPropagation();toggleFav(parseId(b.dataset.fav))});
  $main.querySelectorAll("[data-addlist]").forEach(b=>b.onclick=e=>{e.stopPropagation();openAddToList(parseId(b.dataset.addlist))});
  $main.querySelectorAll("[data-rmlist]").forEach(b=>b.onclick=e=>{
    e.stopPropagation();
    const id=parseId(b.dataset.rmlist);
    if(STATE.activeList==="__favs__"){ toggleFav(id); render(); return; }
    const L=LISTS.find(l=>l.id===STATE.activeList);
    if(L){L.songIds=L.songIds.filter(x=>x!==id);savePersonalState();render();toast("Quitada de la lista")}
  });
  const lb=$main.querySelector("#listBack"); if(lb)lb.onclick=()=>{STATE.activeList=null;STATE.tab="lists";render()};
  const rn=$main.querySelector("#renameList"); if(rn)rn.onclick=()=>renameList(STATE.activeList);
}

// ---- VISTA CANCIÓN ----
function openSong(id){
  STATE.view="song"; STATE.songId=id; STATE.editing=false; STATE.editUnlocked=false; STATE.noCapo=false;
  window.scrollTo(0,0);
  const bar=document.getElementById("alphaBar");
  if(bar)bar.classList.remove("show");
  trackVisit(id);
  render();
  if(isLoggedIn() && !isAdmin()){
    Promise.all([loadPendingEdits(), loadPendingImports()]).then(()=>{
      if(STATE.view==="song" && STATE.songId===id) render();
    });
  }
}
function closeSong(){
  STATE.view="list"; STATE.songId=null; STATE.editing=false; stopAutoscroll();
  document.getElementById("scrollFab").classList.remove("show");
  render();
}

function openAddLink(id){
  if(!isLoggedIn()){openAuthModal();return;}
  const h=`<div class="modal-head"><h3>Agregar enlace</h3>${closeBtn()}</div>
  <div class="modal-body">
    <div class="hint" style="margin-bottom:14px">Agrega un enlace a la canción (YouTube, Spotify, partitura…). El nombre es obligatorio.</div>
    <div class="field"><label>Nombre del enlace *</label><input id="lkLabel" placeholder="p. ej. Video oficial, Letra, Partitura…" autocomplete="off"></div>
    <div class="field"><label>URL *</label><input id="lkUrl" placeholder="https://…" inputmode="url" autocomplete="off"></div>
    <button class="btn primary" id="lkGo" style="width:100%;justify-content:center">Guardar enlace</button>
  </div>`;
  openModal(h);
  document.getElementById("lkLabel").focus();
  document.getElementById("lkGo").onclick=async()=>{
    const label=document.getElementById("lkLabel").value.trim();
    let url=document.getElementById("lkUrl").value.trim();
    if(!label){toast("El nombre del enlace es obligatorio");return}
    if(!url){toast("Falta el URL");return}
    if(!/^https?:\/\//i.test(url)) url="https://"+url;
    const row={song_id:id,url,label,created_by:SESSION.user.id};

    if(!LINKS[id])LINKS[id]=[];
    LINKS[id].push(data);
    closeModal(); toast("Enlace agregado"); render();
  };
}
function openAddComment(id){
  if(!isLoggedIn()){openAuthModal();return;}
  const h=`<div class="modal-head"><h3>Agregar comentario</h3>${closeBtn()}</div>
  <div class="modal-body">
    <div class="hint" style="margin-bottom:14px">Una descripción, una indicación de cómo se canta, una corrección sugerida…</div>
    <div class="field"><label>Comentario</label><textarea id="cmText" rows="4" placeholder="Escribe aquí…"></textarea></div>
    <div class="field"><label>Tu nombre (opcional, o se usará tu email)</label><input id="cmBy" placeholder="quién comenta"></div>
    <button class="btn primary" id="cmGo" style="width:100%;justify-content:center">Publicar comentario</button>
  </div>`;
  openModal(h);
  document.getElementById("cmText").focus();
  document.getElementById("cmGo").onclick=async()=>{
    const t=document.getElementById("cmText").value.trim();
    if(!t){toast("Comentario vacío");return}
    const authorName=document.getElementById("cmBy").value.trim()||SESSION?.user?.email?.split("@")[0]||null;
    const row={song_id:id,body:t,author_name:authorName,created_by:SESSION.user.id};
    const {data,error}=await db.from("song_comments").insert(row).select().single();
    if(error){toast("Error: "+error.message);return;}

function reportSong(id){
  const s=effective(id);

  const body=`Canción: ${s.title}\nCategoría: ${catLabel(s.categoria)}\nColección: ${collLabel(s.coleccion)}\n\nError o sugerencia:\n`;
  window.location.href=`mailto:${CONTACT_EMAIL}?subject=${encodeURIComponent(subj)}&body=${encodeURIComponent(body)}`;

let scrollTimer=null;
function setupAutoscroll(){
  const fab=document.getElementById("scrollFab");
  fab.classList.add("show");
  refreshFab();
  fab.onclick=()=>{ scrollTimer?stopAutoscroll():startAutoscroll(); };
}
function refreshFab(){
  const fab=document.getElementById("scrollFab");
  fab.innerHTML = scrollTimer
    ? `<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/></svg> Detener`
    : `<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg> Auto-scroll`;
}
function startAutoscroll(){
  stopAutoscroll();
  const pxPerTick = Math.max(0.2,(PREFS.scrollSpeed||35)/50);
  scrollTimer=setInterval(()=>{
    window.scrollBy(0,pxPerTick);
    if(window.innerHeight+window.scrollY>=document.body.scrollHeight-2) stopAutoscroll();
  },30);
  refreshFab();
}
function stopAutoscroll(){ if(scrollTimer){clearInterval(scrollTimer);scrollTimer=null;refreshFab();} }

function repPool(part){
  // canciones cuyas categorías cruzan con las de la parte
  return allIds().filter(id=>{
    const sc=catsOf(effective(id));
    return part.cats.some(c=>sc.includes(c));
  });
}
function renderRepertoire(){
  const slots=REP.slots;

      <button class="btn sm danger" id="repClear">Limpiar todo</button>
    </div>`;

  for(const part of MASS_PARTS){
    const sl=slots[part.key];
    const s = sl.songId!=null ? effective(sl.songId) : null;
    const poolN = repPool(part).length;
    html+=`<div class="rep-part${sl.omit?" omit":""}${sl.locked?" locked":""}" data-part="${part.key}">

        </div>
      </div>
      <div class="rep-song">
        ${ s
            ? `<span class="rep-song-name" data-opensong="${esc(String(sl.songId))}">${esc(s.title)}</span>`
            : `<span class="rep-song-name empty">${sl.omit?"— parte sin canción —":"— sin elegir —"}</span>` }
      </div>
    </div>`;
  }
  html+=`</div>`;
  $main.innerHTML=html;
  document.getElementById("scrollFab").classList.remove("show");
  attachRepertoireEvents();
}
function attachRepertoireEvents(){
  const t=document.getElementById("repTitle");
  if(t) t.oninput=()=>{ REP.title=t.value; saveRep(); };

  $main.querySelectorAll("[data-pick]").forEach(b=>b.onclick=()=>openRepPicker(b.dataset.pick));
  $main.querySelectorAll("[data-dice]").forEach(b=>b.onclick=()=>{
    const key=b.dataset.dice, part=MASS_PARTS.find(p=>p.key===key);
    const pool=repPool(part); if(!pool.length){toast("No hay canciones de esa categoría");return;}
    const used=usedSongIds(key);
    let pick=pool.filter(id=>!used.includes(id));
    if(!pick.length)pick=pool;
    REP.slots[key].songId=pick[Math.floor(Math.random()*pick.length)];
    REP.slots[key].omit=false; saveRep(); render();
  });
  $main.querySelectorAll("[data-lock]").forEach(b=>b.onclick=()=>{
    const k=b.dataset.lock; REP.slots[k].locked=!REP.slots[k].locked; saveRep(); render();
  });
  $main.querySelectorAll("[data-omit]").forEach(b=>b.onclick=()=>{
    const k=b.dataset.omit, sl=REP.slots[k];
    if(sl.omit){ sl.omit=false; }
    else { sl.omit=true; sl.songId=null; sl.locked=false; }
    saveRep(); render();
  });
  $main.querySelectorAll("[data-opensong]").forEach(el=>el.onclick=()=>openSong(parseId(el.dataset.opensong)));

  document.getElementById("repRandom").onclick=repGenerateAll;
  document.getElementById("repSave").onclick=repSaveAsList;
  document.getElementById("repClear").onclick=()=>{ REP=freshRep(); saveRep(); render(); toast("Repertorio vaciado"); };
}
function usedSongIds(exceptKey){
  const out=[];
  for(const p of MASS_PARTS){ if(p.key===exceptKey)continue; const id=REP.slots[p.key].songId; if(id!=null)out.push(id); }
  return out;
}
function repGenerateAll(){
  for(const part of MASS_PARTS){
    const sl=REP.slots[part.key];
    if(sl.locked || sl.omit) continue;
    const pool=repPool(part);
    const used=usedSongIds(part.key);
    let pick=pool.filter(id=>!used.includes(id));
    if(!pick.length)pick=pool;
    sl.songId = pick.length ? pick[Math.floor(Math.random()*pick.length)] : null;
  }
  saveRep(); render();
  toast("Repertorio generado");
}
function openRepPicker(partKey){
  const part=MASS_PARTS.find(p=>p.key===partKey);
  const html=`<div class="modal-head"><h3>Elegir · ${esc(part.label)}</h3>${closeBtn()}</div>
  <div class="modal-body">
    <div class="search-wrap" style="margin-bottom:6px">
      <svg class="ico" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.2-3.2"/></svg>
      <input id="repSearch" type="search" placeholder="Buscar por título o letra…" autocomplete="off">
    </div>
    <label style="display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--muted);margin:6px 0 2px">
      <input type="checkbox" id="repOnlyCat" checked style="width:auto"> Solo canciones de esta parte (${esc(part.cats.map(catLabel).join(", "))})
    </label>
    <div class="rep-pick-list" id="repPickList"></div>
  </div>`;
  openModal(html);
  const inp=document.getElementById("repSearch");
  const only=document.getElementById("repOnlyCat");
  const listEl=document.getElementById("repPickList");
  function draw(){
    const q=norm(inp.value);
    let ids = only.checked ? repPool(part) : allIds();
    if(q) ids=ids.filter(id=>songSearchText(id).includes(q));
    ids=ids.slice(0,120);
    if(!ids.length){ listEl.innerHTML=`<div class="hint" style="padding:14px 4px">Nada encontrado.</div>`; return; }
    listEl.innerHTML=ids.map(id=>{
      const s=effective(id);
      return `<div class="rep-pick-row" data-choose="${esc(String(id))}">
        <span class="t">${esc(s.title)}</span>
        <span class="s">${catsOf(s).map(catLabel).join(" · ")||"—"} · ${esc(collLabel(collOf(s)))}</span>
      </div>`;
    }).join("");
    listEl.querySelectorAll("[data-choose]").forEach(r=>r.onclick=()=>{
      REP.slots[partKey].songId=parseId(r.dataset.choose);
      REP.slots[partKey].omit=false;
      saveRep(); closeModal(); render();
    });
  }
  inp.oninput=draw; only.onchange=draw; draw(); inp.focus();
}
function repSaveAsList(){
  const ordered=[];

  LISTS.push({id:uid(),name:name.trim(),songIds:ordered});

  toast(`Guardado en “${name.trim()}” (${ordered.length} canciones)`);

    <div class="field"><label>Título</label><input id="edTitle" value="${esc(d.title)}"></div>

    <div class="field"><label>Categorías (etiquetas — puedes elegir varias)</label>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="field"><label>¿Litúrgica?</label><select id="edLit">${litOpts}</select></div>
      <div class="field"><label>Colección</label><select id="edColl">${collOpts}</select></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="field"><label>Cejillo (traste)</label><input id="edCapo" inputmode="numeric" value="${esc(d.capo||"")}" placeholder="0 = sin cejillo"></div>
      <div class="field"><label>Créditos (opcional)</label><input id="edCredits" value="${esc(d.credits||"")}" placeholder="autor / fuente"></div>
    </div>

    <div id="chordWarn" class="chord-warn" style="display:none"></div>

    <div style="display:flex;align-items:center;justify-content:space-between;margin:18px 0 10px">
      <label style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)">Estrofas</label>
      <span class="hint" style="margin:0">Deja la letra vacía y pon solo acordes para intros/interludios.</span>
    </div>
    <div id="edSections">`;

  d.sections.forEach((sec,si)=>{
    html+=`<div class="ed-section" data-sec="${si}">
      <div class="ed-section-head">
        <span class="lbl">Estrofa ${si+1}</span>
        <div class="ed-line-tools">
          <button class="txt-mini" data-secup="${si}" ${si===0?"disabled style=opacity:.3":""}>↑</button>
          <button class="txt-mini" data-secdown="${si}" ${si===d.sections.length-1?"disabled style=opacity:.3":""}>↓</button>
          <button class="txt-mini" data-secdup="${si}" title="Duplicar estrofa completa">⧉ Duplicar</button>
          <button class="txt-mini" data-seccopychords="${si}" title="Copiar acordes de otra estrofa">♪ Copiar acordes</button>
          <button class="txt-mini del" data-secdel="${si}">Eliminar estrofa</button>
        </div>
      </div>`;
    sec.forEach((ln,li)=>{
      html+=`<div class="ed-line" data-line="${si}-${li}">
        <input class="ci" data-ch="${si}-${li}" placeholder="acordes (opcional)" value="${esc(ln.chords||"")}">
        <input class="li" data-ly="${si}-${li}" placeholder="letra" value="${esc(ln.lyric||"")}">
        <div class="ed-line-tools" style="justify-content:flex-end">
          <button class="txt-mini" data-lineup="${si}-${li}" ${li===0?"disabled style=opacity:.3":""}>↑</button>
          <button class="txt-mini" data-linedown="${si}-${li}" ${li===sec.length-1?"disabled style=opacity:.3":""}>↓</button>
          <button class="txt-mini del" data-linedel="${si}-${li}">Quitar línea</button>
        </div>
      </div>`;
    });
    html+=`<button class="txt-mini" data-addline="${si}" style="color:var(--indigo)">+ Agregar línea</button>
    </div>`;

  html+=`</div>
    <button class="btn" id="addSection" style="width:100%;justify-content:center;margin:4px 0 20px"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M12 5v14M5 12h14"/></svg> Agregar estrofa</button>
`;

  if(tgt==="song" && isAdmin()){
    // ---- moderación de enlace y comentarios (solo admin) ----
    const lnk=LINKS[id]||null;

    html+=`<div class="mod-zone">
      <div class="ex-head"><span>Enlace y comentarios (moderación)</span></div>`;
    const songLinks2=LINKS[id]||[];
    if(songLinks2.length){
      songLinks2.forEach(lnk2=>{
        html+=`<div class="mod-row"><a class="link-chip sm" href="${esc(lnk2.url)}" target="_blank" rel="noopener" style="flex:1;min-width:0"><span>${esc(lnk2.label||lnk2.url)}</span></a>
          <div class="ed-line-tools"><button class="txt-mini del" data-modlinkdel="${esc(lnk2.id)}">Quitar</button></div></div>`;

    } else {
      html+=`<div class="hint" style="margin:0 0 8px">Sin enlaces.</div>`;
    }
    if(cms.length){
      cms.forEach(c=>{ html+=`<div class="mod-row"><div class="mod-cmt"><b>${c.author_name?esc(c.author_name):"Anónimo"}:</b> ${esc(c.body)}</div>
        <button class="txt-mini del" data-cmtdel="${esc(c.id)}">Eliminar</button></div>`; });
    } else {
      html+=`<div class="hint" style="margin:6px 0 0">Sin comentarios.</div>`;
    }
    html+=`</div>`;
  }

  let saveLbl, saveIcon=`<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M5 12l5 5L20 7"/></svg>`;
  if(tgt==="new") saveLbl="Agregar a la plataforma";
  else if(tgt==="new_version") saveLbl=isAdmin()?"Agregar versión":"Enviar versión para revisión";
  else if(tgt==="staged") saveLbl="Guardar y volver a revisión";
  else if(tgt==="pending_approve") saveLbl="Aprobar y guardar";
  else if(isAdmin()) saveLbl="Guardar correcciones";
  else saveLbl="Enviar para revisión";

  html+=`<div style="display:flex;gap:10px;flex-wrap:wrap;border-top:1px solid var(--line);padding-top:18px">

      ${tgt==="song"&&isAdmin()&&isEdited(id)?`<button class="btn danger" id="restoreEdit">Restaurar original</button>`:""}
      ${tgt==="song"&&isAdmin()?`<button class="btn danger" id="deleteSong" style="margin-left:auto">🗑 Eliminar canción</button>`:""}
    </div>
  </div>`;
  $main.innerHTML=html;
  attachEditorEvents(id);
}

function readEditorIntoDraft(){
  const d=STATE.editDraft;
  d.title=document.getElementById("edTitle").value;
  d.categorias=[...document.querySelectorAll("#edCats .tagsel.on")].map(b=>b.dataset.cattag);
  const litv=document.getElementById("edLit").value;
  d.liturgica = litv==="si"?true : litv==="no"?false : null;
  d.coleccion=document.getElementById("edColl").value;
  const cp=document.getElementById("edCapo").value.trim();
  d.capo = cp===""?0:(Math.max(0,parseInt(cp,10)||0));
  const cr=document.getElementById("edCredits"); if(cr)d.credits=cr.value.trim();
  const vl=document.getElementById("edVersionLabel"); if(vl)d.versionLabel=vl.value.trim();
  document.querySelectorAll("[data-ch]").forEach(inp=>{
    const [si,li]=inp.dataset.ch.split("-").map(Number);
    d.sections[si][li].chords=inp.value;
  });
  document.querySelectorAll("[data-ly]").forEach(inp=>{
    const [si,li]=inp.dataset.ly.split("-").map(Number);
    d.sections[si][li].lyric=inp.value;
  });
}
// Evita doble-envío: deshabilita el botón de guardar y muestra "Guardando…"
// hasta que la operación termine (éxito = la pantalla cambia igual; error = se reactiva).
function lockSaveBtn(){
  const btn=document.getElementById("saveEdit");
  if(!btn||btn.dataset.busy==="1")return null;
  btn.dataset.busy="1";
  btn.dataset.origLbl=btn.innerHTML;
  btn.disabled=true; btn.style.opacity=".55"; btn.style.pointerEvents="none";
  btn.innerHTML="Guardando…";
  return btn;
}
function unlockSaveBtn(){
  const btn=document.getElementById("saveEdit");
  if(!btn)return;
  btn.disabled=false; btn.style.opacity=""; btn.style.pointerEvents="";
  if(btn.dataset.origLbl)btn.innerHTML=btn.dataset.origLbl;
  btn.dataset.busy="";
}
function attachEditorEvents(id){
  const tgt=STATE.editTarget;
  const vob=document.getElementById("viewOriginalBtn");
  if(vob)vob.onclick=()=>{ openOriginalSongModal(SONGS[id]||{}); };
  document.getElementById("cancelEdit").onclick=()=>{
    STATE.editing=false;
    if(tgt==="staged"){ STATE.view="review"; }
    else if(tgt==="new"){ STATE.view="list"; }
    else if(tgt==="new_version"){ STATE.view="song"; STATE.songId=STATE.editDraft._versionParent||null; }
    else if(tgt==="pending_approve"){ openPendingEditsPanel(); return; }
    else { STATE.editTarget="song"; }
    render();
  };
  document.getElementById("addSection").onclick=()=>{readEditorIntoDraft();STATE.editDraft.sections.push([{lyric:"",chords:""}]);render()};
  document.getElementById("saveEdit").onclick=async()=>{
    const sbtn=lockSaveBtn(); if(!sbtn)return; // ya se está guardando, ignora clicks repetidos
    readEditorIntoDraft();
    const d=STATE.editDraft;
    if(!d.title.trim()){toast("Falta el título");unlockSaveBtn();return}
    const clean=d.sections.map(sec=>sec.map(ln=>{const o={lyric:ln.lyric||""};if(ln.chords&&ln.chords.trim())o.chords=ln.chords.trim();return o})).filter(sec=>sec.length);
    const songObj={title:d.title.trim(),categorias:(d.categorias||[]),coleccion:d.coleccion||"general",sections:clean};
    if(d.liturgica===true||d.liturgica===false) songObj.liturgica=d.liturgica;
    if(d.capo>0) songObj.capo=d.capo; else songObj.capo=0;
    if(d.credits&&d.credits.trim()) songObj.credits=d.credits.trim(); else songObj.credits=null;

    if(tgt==="new"){
      const dup=findDuplicateCandidate(songObj.title, songObj.sections);
      if(dup){
        unlockSaveBtn(); // el guardado real ocurre recién al resolver el modal de duplicado
        openDuplicateModal(dup.id,(action,label,parentId)=>{
          if(action==='same'){ toast('No se subió: ya existe en el catálogo.'); return; }
          finalizeNewSong(songObj, action==='version'?parentId:null, label);
        });
        return;
      }
      finalizeNewSong(songObj, null, null);
      return;
    }
    if(tgt==="new_version"){
      finalizeNewSong(songObj, d._versionParent, d.versionLabel);
      return;
    }
    if(tgt==="staged"){
      const prev=STATE.staged[STATE.editStagedIdx]||{};
      STATE.staged[STATE.editStagedIdx]=Object.assign({},songObj,{
        _dup:prev._dup, _dupAction:prev._dupAction, _dupLabel:prev._dupLabel,
        parent_song_id:prev.parent_song_id, version_label:prev.version_label
      });
      if(STATE.reviewMode==="admin") STATE.reviewEdited=true;
      STATE.editing=false; STATE.view="review";
      toast("Cambios guardados"); render(); return;
    }
    // tgt === "song"
    if(isAdmin() || STATE.editTarget==="pending_approve"){
      // Admin edita directamente (o aprueba un pending)
      const {error}=await db.from("songs").update({...songObj,updated_at:new Date().toISOString()}).eq("id",id);
      if(error){toast("Error al guardar: "+error.message);unlockSaveBtn();return;}
      SONGS[id]=Object.assign({},SONGS[id],songObj);
      if(STATE.editTarget==="pending_approve"&&STATE.editPendingId){
        const pe=PENDING_EDITS.find(p=>String(p.id)===String(STATE.editPendingId));
        await db.from("pending_edits").update({status:"approved",reviewed_at:new Date().toISOString(),reviewed_by:SESSION.user.id}).eq("id",STATE.editPendingId);
        if(pe)createNotification(pe.submitted_by,'edit_approved','pending_edits',pe.id,`Tu sugerencia para "${songObj.title}" fue aprobada (con algunos ajustes del administrador).`);
        logSongHistory(id,'edited',{title:songObj.title,via:'pending_approve_edited'});
        PENDING_EDITS=PENDING_EDITS.filter(p=>p.id!==STATE.editPendingId);
        PENDING_COUNT=PENDING_EDITS.length;
        STATE.editPendingId=null;
      } else {
        logSongHistory(id,'edited',{title:songObj.title});
      }
      STATE.editing=false; STATE.editTarget="song"; toast("Correcciones guardadas"); render();
    } else {
      // Usuario no-admin: guardar como sugerencia pendiente
      const row={song_id:id,edit_data:songObj,submitted_by:SESSION.user.id,
        submitter_name:PROFILE?.display_name||SESSION.user.email?.split("@")[0]||null,status:"pending"};
      const {data,error}=await db.from("pending_edits").insert(row).select().single();
      if(error){
        if(error.message&&(error.message.includes("pending_edits")||error.message.includes("schema cache")||error.message.includes("does not exist"))){
          toast("⚠ El administrador aún no habilitó las sugerencias. Usa el botón 'Reportar' para enviar cambios por email.");
        } else {
          toast("Error al enviar: "+error.message);
        }
        unlockSaveBtn();
        return;
      }
      MY_PENDING[id]={song_id:id,status:"pending"};
      STATE.editing=false;
      toast("Sugerencia enviada. Quedará pendiente de revisión por el administrador.");
      render();
    }
  };

  // restoreEdit not applicable in Supabase model

  const del=document.getElementById("deleteSong");
  if(del)del.onclick=()=>deleteSong(id);

  // moderación enlace/comentarios (solo target song)
  document.querySelectorAll("[data-modlinkdel]").forEach(b=>b.onclick=async()=>{
    if(!confirm("¿Quitar el enlace?"))return;
    const lid=b.dataset.modlinkdel;
    await db.from("song_links").delete().eq("id",lid);
    LINKS[id]=(LINKS[id]||[]).filter(l=>l.id!==lid);
    toast("Enlace quitado"); render();
  });
  document.querySelectorAll("[data-cmtdel]").forEach(b=>b.onclick=async()=>{
    await db.from("song_comments").delete().eq("id",b.dataset.cmtdel);
    if(COMMENTS[id]) COMMENTS[id]=COMMENTS[id].filter(c=>String(c.id)!==b.dataset.cmtdel);
    toast("Comentario eliminado"); render();
  });

  // etiquetas de categoría (multi-selección)
  document.querySelectorAll("#edCats .tagsel").forEach(b=>b.onclick=()=>{ b.classList.toggle("on"); });

  // validación de acordes en vivo (marca en rojo los no reconocidos)
  function validateChords(){
    let bad=0;
    document.querySelectorAll(".ci").forEach(inp=>{
      const has=lineHasBadChord(inp.value);
      inp.classList.toggle("ci-bad",has);
      if(has)bad++;
    });
    const w=document.getElementById("chordWarn");
    if(w){
      if(bad){ w.style.display="block"; w.innerHTML=`⚠ Hay ${bad} línea(s) con acordes que <b>no se reconocen</b> (en rojo). No cambiarán de tono. Revisa la notación latina (DO RE MI FA SOL LA SI) o déjalos así a propósito.`; }
      else w.style.display="none";
    }
  }
  document.querySelectorAll(".ci").forEach(inp=>inp.addEventListener("input",validateChords));
  validateChords();

  document.querySelectorAll("[data-addline]").forEach(b=>b.onclick=()=>{readEditorIntoDraft();STATE.editDraft.sections[+b.dataset.addline].push({lyric:"",chords:""});render()});
  document.querySelectorAll("[data-linedel]").forEach(b=>b.onclick=()=>{readEditorIntoDraft();const[si,li]=b.dataset.linedel.split("-").map(Number);STATE.editDraft.sections[si].splice(li,1);if(STATE.editDraft.sections[si].length===0)STATE.editDraft.sections.splice(si,1);render()});
  document.querySelectorAll("[data-secdel]").forEach(b=>b.onclick=()=>{readEditorIntoDraft();STATE.editDraft.sections.splice(+b.dataset.secdel,1);render()});
  const mv=(arr,from,to)=>{const x=arr.splice(from,1)[0];arr.splice(to,0,x)};
  document.querySelectorAll("[data-secup]").forEach(b=>b.onclick=()=>{readEditorIntoDraft();const i=+b.dataset.secup;mv(STATE.editDraft.sections,i,i-1);render()});
  document.querySelectorAll("[data-secdown]").forEach(b=>b.onclick=()=>{readEditorIntoDraft();const i=+b.dataset.secdown;mv(STATE.editDraft.sections,i,i+1);render()});
  document.querySelectorAll("[data-secdup]").forEach(b=>b.onclick=()=>{
    readEditorIntoDraft();
    const i=+b.dataset.secdup;
    const clone=JSON.parse(JSON.stringify(STATE.editDraft.sections[i]));
    STATE.editDraft.sections.splice(i+1,0,clone);
    render();
  });
  document.querySelectorAll("[data-seccopychords]").forEach(b=>b.onclick=()=>{
    readEditorIntoDraft();
    openChordCopyPicker(+b.dataset.seccopychords);
  });
  document.querySelectorAll("[data-lineup]").forEach(b=>b.onclick=()=>{readEditorIntoDraft();const[si,li]=b.dataset.lineup.split("-").map(Number);mv(STATE.editDraft.sections[si],li,li-1);render()});
  document.querySelectorAll("[data-linedown]").forEach(b=>b.onclick=()=>{readEditorIntoDraft();const[si,li]=b.dataset.linedown.split("-").map(Number);mv(STATE.editDraft.sections[si],li,li+1);render()});
}

// ---- Copiar acordes de otra estrofa (línea por línea, según índice) ----
function openChordCopyPicker(targetIdx){
  const secs=STATE.editDraft.sections;
  const options=secs.map((sec,i)=>{
    if(i===targetIdx)return "";
    const preview=((sec.find(l=>l.lyric)||sec[0]||{}).lyric)||"(sin letra)";
    return `<button class="btn sm" data-srcsec="${i}" style="width:100%;justify-content:flex-start;margin-bottom:6px">Estrofa ${i+1}: ${esc(preview.slice(0,40))}</button>`;
  }).join("");
  if(!options.trim()){ toast("No hay otras estrofas para copiar"); return; }
  openModal(`<div class="modal-head"><h3>Copiar acordes de…</h3>${closeBtn()}</div>
    <div class="modal-body">
      <div class="hint" style="margin-bottom:10px">Se aplican los acordes línea por línea a la Estrofa ${targetIdx+1}. Si las estrofas tienen distinto largo, las líneas sin pareja quedan sin acorde.</div>
      ${options}
    </div>`);
  document.querySelectorAll("[data-srcsec]").forEach(b=>b.onclick=()=>{
    const srcIdx=+b.dataset.srcsec;
    closeModal();
    applyChordsFromSection(srcIdx, targetIdx);
    render();
  });
}
function applyChordsFromSection(srcIdx, targetIdx){
  const secs=STATE.editDraft.sections;
  const src=secs[srcIdx], tgt=secs[targetIdx];
  let unmatched=0;
  for(let i=0;i<tgt.length;i++){
    if(i<src.length){ tgt[i].chords=src[i].chords||""; }
    else { tgt[i].chords=""; unmatched++; }
  }
  if(src.length!==tgt.length){
    toast(`Acordes copiados${unmatched>0?` (${unmatched} línea(s) quedaron sin acorde por diferencia de tamaño)`:""}.`);
  } else {
    toast("Acordes copiados");
  }
}

async function deleteSong(id){
  const s=effective(id); if(!s)return;
  const isBase=!!s.is_base;
  if(!confirm(`¿Eliminar "${s.title}"?`+(isBase?" La canción quedará oculta para todos.":""))) return;
  if(isBase){
    await db.from("songs").update({hidden:true}).eq("id",id);
  } else {
    await db.from("songs").delete().eq("id",id);
  }
  delete SONGS[id];
  FAVS=FAVS.filter(x=>x!==id); LISTS.forEach(L=>L.songIds=L.songIds.filter(x=>x!==id));
  savePersonalState();
  STATE.editing=false; closeSong(); toast("Canción eliminada");
}

function adminPanel(){
  // Claves en el orden guardado
  let orderedKeys=[...COLLECTIONS_ORDER.filter(k=>COLLECTIONS[k]||k==="general")];
  // Agregar cualquier clave usada por canciones aunque no esté registrada en COLLECTIONS
  const songCollKeys=new Set(Object.values(SONGS).map(s=>s.coleccion).filter(Boolean));
  songCollKeys.forEach(k=>{ if(!orderedKeys.includes(k)) orderedKeys.push(k); });
  // Agregar el resto de allCollKeys por compatibilidad
  allCollKeys().forEach(k=>{if(!orderedKeys.includes(k))orderedKeys.push(k);});

  // Detectar claves sin etiqueta en la tabla collections (colecciones "huérfanas")
  const orphaned=orderedKeys.filter(k=>k!=="general"&&!COLLECTIONS[k]);
  const orphanHint=orphaned.length>0
    ?`<div class="hint" style="background:var(--gold-bg);border-left:3px solid var(--gold);border-radius:8px;padding:8px 12px;margin-bottom:14px">
        ⚠ Hay ${orphaned.length} colección(es) que las canciones ya usan pero no tienen nombre oficial registrado (aparecen con su clave interna en vez de un nombre visible). Asígnales un nombre aquí y guarda.
      </div>`
    :"";

  function buildCollRows(keys){
    return keys.map((k,i)=>{
      const isOrphan=k!=="general"&&!COLLECTIONS[k];
      return `
      <div class="coll-admin-row" data-k="${esc(k)}" data-i="${i}">
        <div class="coll-order-btns">
          <button class="txt-mini" data-cup="${i}" ${i===0?"disabled style='opacity:.3'":""}>↑</button>
          <button class="txt-mini" data-cdown="${i}" ${i===keys.length-1?"disabled style='opacity:.3'":""}>↓</button>
        </div>
        <input data-coll="${esc(k)}" value="${esc(collLabel(k))}" placeholder="Nombre de la colección"
          style="${isOrphan?"border-color:var(--gold);background:var(--gold-bg)":""}">
        ${isOrphan?`<span title="Sin nombre registrado — dale un nombre y guarda" style="color:var(--gold);font-size:13px;flex-shrink:0">⚠</span>`:""}
        ${k==="general"?"":
          `<button class="txt-mini del" data-cdel="${esc(k)}" title="Eliminar colección">🗑</button>`}
      </div>`;
    }).join("");
  }

  const pendSection = PENDING_COUNT>0 ? `
    <div class="field" style="border-top:1px solid var(--line);padding-top:16px">
      <label>Ediciones pendientes <span class="pending-badge">${PENDING_COUNT}</span></label>
      <div class="hint" style="margin-top:0;margin-bottom:10px">Usuarios han sugerido cambios que esperan tu revisión.</div>
      <button class="btn sm" id="seePendingBtn">Ver pendientes</button>
    </div>` : "";

  const pendImpSection = PENDING_IMPORT_COUNT>0 ? `
    <div class="field" style="border-top:1px solid var(--line);padding-top:16px">
      <label>Canciones nuevas e importaciones <span class="pending-badge">${PENDING_IMPORT_COUNT}</span></label>
      <div class="hint" style="margin-top:0;margin-bottom:10px">Canciones agregadas a mano o cancioneros importados, esperando tu aprobación.</div>
      <button class="btn sm" id="seePendingImpBtn">Ver pendientes</button>
    </div>` : "";

  const html=`<div class="modal-head"><h3>Ajustes de admin</h3>${closeBtn()}</div>
  <div class="modal-body">
    <div class="field"><label>Colecciones</label>
      <div class="hint" style="margin-top:0;margin-bottom:12px">Reordena, renombra o elimina colecciones. Guarda antes de crear una nueva.</div>
      ${orphanHint}
      <div id="adminCollRows">${buildCollRows(orderedKeys)}</div>
      <button class="btn sm" id="addCollBtn" style="margin-top:8px">➕ Nueva colección</button>
    </div>
    <button class="btn primary" id="saveColls" style="width:100%;justify-content:center;margin-top:14px">Guardar colecciones</button>
    ${pendSection}
    ${pendImpSection}
  </div>`;
  openModal(html);

  function reRenderRows(){
    document.getElementById("adminCollRows").innerHTML=buildCollRows(orderedKeys);
    attachCollRowEvents();
  }
  function attachCollRowEvents(){
    const mv=(arr,from,to)=>{const x=arr.splice(from,1)[0];arr.splice(to,0,x)};
    document.querySelectorAll("[data-cup]").forEach(b=>b.onclick=()=>{const i=+b.dataset.cup;if(i>0){mv(orderedKeys,i,i-1);reRenderRows();}});
    document.querySelectorAll("[data-cdown]").forEach(b=>b.onclick=()=>{const i=+b.dataset.cdown;if(i<orderedKeys.length-1){mv(orderedKeys,i,i+1);reRenderRows();}});
    document.querySelectorAll("[data-cdel]").forEach(b=>b.onclick=async()=>{
      const k=b.dataset.cdel;
      const songsInColl=allIds().filter(id=>collOf(effective(id))===k).length;
      const msg=songsInColl>0?`¿Eliminar la colección "${collLabel(k)}"? Las ${songsInColl} canciones pasarán a "General".`:`¿Eliminar la colección "${collLabel(k)}"?`;
      if(!confirm(msg))return;
      await db.from("collections").delete().eq("id",k);
      if(songsInColl>0){
        await db.from("songs").update({coleccion:"general"}).eq("coleccion",k);
        allIds().forEach(id=>{if(SONGS[id]&&SONGS[id].coleccion===k)SONGS[id].coleccion="general";});
      }
      delete COLLECTIONS[k];
      orderedKeys=orderedKeys.filter(x=>x!==k);
      reRenderRows(); toast("Colección eliminada");
    });
  }
  attachCollRowEvents();

  document.getElementById("addCollBtn").onclick=()=>openNewCollectionModal(orderedKeys,reRenderRows);

  document.getElementById("saveColls").onclick=async()=>{
    // Leer etiquetas desde los inputs
    document.querySelectorAll("[data-coll]").forEach(inp=>{
      const k=inp.dataset.coll, v=inp.value.trim();
      if(v) COLLECTIONS[k]=v;
    });
    // Upsert de todas las colecciones (incluye creación de entradas para claves huérfanas)
    const upsertRows=orderedKeys.map((k,i)=>({id:k,label:COLLECTIONS[k]||k,sort_order:i}));
    const {error} = await db.from("collections").upsert(upsertRows,{onConflict:"id"});
    if(error){
      // Fallback sin sort_order (por si la columna no existe aún)
      const fallback=orderedKeys.map(k=>({id:k,label:COLLECTIONS[k]||k}));
      const {error:e2} = await db.from("collections").upsert(fallback,{onConflict:"id"});
      if(e2){toast("Error al guardar: "+e2.message);return;}
    }
    COLLECTIONS_ORDER=[...orderedKeys];
    toast("Colecciones actualizadas"); closeModal(); render();
  };

  const spBtn=document.getElementById("seePendingBtn");
  if(spBtn)spBtn.onclick=()=>{closeModal();openPendingEditsPanel();};
  const spiBtn=document.getElementById("seePendingImpBtn");
  if(spiBtn)spiBtn.onclick=()=>{closeModal();openPendingImportsPanel();};
}

function openNewCollectionModal(orderedKeys, reRenderRows){
  const nm=(window.prompt("Nombre de la nueva colección:")||"").trim();
  if(!nm)return;
  const key=newCollKey();
  (async()=>{
    const baseData={id:key,label:nm,created_by:SESSION?.user.id||null};
    // Intentar con sort_order primero
    let {error}=await db.from("collections").insert({...baseData,sort_order:orderedKeys.length});
    if(error){
      // Fallback sin sort_order (columna puede no existir aún)
      const res=await db.from("collections").insert(baseData);
      error=res.error;
    }
    if(error){toast("Error al crear colección: "+error.message);return;}
    COLLECTIONS[key]=nm;
    orderedKeys.push(key);
    COLLECTIONS_ORDER=[...orderedKeys];
    // Ofrecer asignar canciones a esta nueva colección
    openAssignSongsModal(key, nm);
  })();
}

function openAssignSongsModal(collKey, collName){

  const selected=new Set();

    return filtered.map(s=>`
      <div class="song-check-row${selected.has(s.id)?" checked":""}" data-sid="${s.id}">

        <span style="font-size:14px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(s.title)}</span>

    </div>
  </div>`;
  openModal(html);

  document.getElementById("assignSearch").oninput=e=>{
    searchQ=e.target.value;
    document.getElementById("assignList").innerHTML=buildRows();
    attachCheckEvents();
  };
  function attachCheckEvents(){
    document.querySelectorAll(".song-check-row[data-sid]").forEach(r=>r.onclick=()=>{
      const sid=r.dataset.sid;
      if(selected.has(sid))selected.delete(sid); else selected.add(sid);
      r.classList.toggle("checked",selected.has(sid));
      r.querySelector(".cb").innerHTML=selected.has(sid)?'<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M4 12l5 5L20 6"/></svg>':'';
    });
  }
  attachCheckEvents();

  document.getElementById("assignSkip").onclick=()=>{closeModal();toast(`Colección "${collName}" creada`);render();};
  document.getElementById("assignSave").onclick=async()=>{
    if(!selected.size){closeModal();toast(`Colección "${collName}" creada`);render();return;}

    const {error}=await db.from("songs").update({coleccion:collKey}).in("id",ids);
    if(error){toast("Error: "+error.message);return;}
    ids.forEach(id=>{if(SONGS[id])SONGS[id].coleccion=collKey;});
    closeModal(); toast(`Colección "${collName}" creada con ${ids.length} canciones`); render();
  };
}
function download(name,obj){
  const blob=new Blob([typeof obj==="string"?obj:JSON.stringify(obj,null,2)],{type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=name; a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),1500);
}

function exportSongs(){
  const ids=allIds();
  const out={total:ids.length, songs:ids.map(id=>{
    const e=effective(id);
    const o={title:e.title,categorias:catsOf(e),coleccion:collOf(e),sections:e.sections};
    if(e.liturgica===true||e.liturgica===false)o.liturgica=e.liturgica;
    if(+e.capo>0)o.capo=+e.capo;
    if(e.credits)o.credits=e.credits;
    if(LINKS[id])o.link=LINKS[id].url;
    if(COMMENTS[id]&&COMMENTS[id].length)o.comments=COMMENTS[id].map(c=>c.body);
    return o;
  })};
  download("cancionero_completo.json",out);
  toast("Cancionero exportado");
}

const VALID_CATS=new Set(CAT_ORDER);
async function handleImportFile(ev){
  const f=ev.target.files[0]; if(!f)return;
  const collName=(document.getElementById("impCollName")?document.getElementById("impCollName").value.trim():"")||"";
  const r=new FileReader();
  r.onload=async()=>{
    let data;
    try{ data=JSON.parse(r.result); }catch(e){ toast("El archivo no es JSON válido"); return; }
    const songs = Array.isArray(data)?data : (data&&Array.isArray(data.songs)?data.songs:null);
    if(!songs){ toast("No se encontró una lista de canciones"); return; }
    // clave tentativa de colección — se crea recién cuando el admin aprueba
    let collKey="general";
    if(collName){ collKey=newCollKey(); }
    const staged=[];
    for(const s of songs){
      if(!s||typeof s!=="object")continue;
      const title=(s.title||s.titulo||"").toString().trim();
      let sections=s.sections;
      if(!Array.isArray(sections)){
        if(typeof s.lyrics==="string"){ sections=[s.lyrics.split("\n").map(l=>({lyric:l}))]; }
        else sections=[];
      }
      sections=(sections||[]).map(sec=>{
        if(!Array.isArray(sec))return [];
        const lines=[];
        for(const ln of sec){
          if(typeof ln==="string"){lines.push({lyric:ln});continue;}
          const ch=(ln.chords||ln.acordes||"").toString().trim();
          const ly=(ln.lyric??ln.letra??"").toString();
          if(ly.includes("\n")){
            ly.split("\n").forEach(sl=>lines.push(ch&&!sl?{lyric:"",chords:ch}:{lyric:sl,...(ch?{chords:ch}:{})}));
          } else {
            const o={lyric:ly||""};if(ch)o.chords=ch;lines.push(o);
          }
        }
        return lines;
      }).filter(sec=>sec.length);
      if(!title && !sections.length) continue;
      // categorías (array o singular legacy)
      let rawc = Array.isArray(s.categorias)?s.categorias : (s.categoria?[s.categoria]:(s.category?[s.category]:[]));
      let cats = rawc.map(c=>(c||"").toString().trim()).filter(c=>VALID_CATS.has(c));
      // liturgica
      let lit=undefined;
      if(s.liturgica===true||s.liturgica==="true"||s.liturgica==="si"||s.liturgica==="sí")lit=true;
      else if(s.liturgica===false||s.liturgica==="false"||s.liturgica==="no")lit=false;
      // capo
      let capo=parseInt(s.capo??s.cejillo??0,10); if(isNaN(capo)||capo<0)capo=0;
      const obj={
        title:title||"(sin título)",
        categorias:cats,
        coleccion:collKey,
        credits:(s.credits||s.creditos||"").toString().trim(),
        sections: sections.length?sections:[[{lyric:""}]]
      };
      if(lit!==undefined)obj.liturgica=lit;
      if(capo>0)obj.capo=capo;
      staged.push(obj);
    }
    if(!staged.length){ toast("No se pudo leer ninguna canción"); return; }
    // detección de duplicados contra el catálogo ya publicado
    staged.forEach(obj=>{
      const dup=findDuplicateCandidate(obj.title, obj.sections);
      obj._dup = dup ? {id:dup.id, title:SONGS[dup.id]?.title||""} : null;
      obj._dupAction = null; obj._dupLabel = "";
    });
    STATE.staged=staged; STATE.reviewMode="submit"; STATE.reviewEdited=false;
    STATE.importCollName=collName||null; STATE.importCollKey=collKey;
    STATE.view="review"; closeModal(); window.scrollTo(0,0); render();
  };
  r.readAsText(f);
}


function cleanSections(sections){
  return (sections||[]).map(sec=>sec.map(ln=>{const o={lyric:ln.lyric||""};if(ln.chords&&ln.chords.trim())o.chords=ln.chords.trim();return o})).filter(sec=>sec.length);
}
function buildPayloadSong(s){
  const clean=cleanSections(s.sections);
  const obj={title:(s.title||"").trim(),categorias:(s.categorias||[]),coleccion:s.coleccion||"general",sections:clean.length?clean:[[{lyric:""}]]};
  if(s.liturgica===true||s.liturgica===false)obj.liturgica=s.liturgica;
  obj.capo=+s.capo>0?+s.capo:0;
  if(s.credits&&s.credits.trim())obj.credits=s.credits.trim();
  if(s.parent_song_id){ obj.parent_song_id=s.parent_song_id; obj.version_label=s.version_label||""; }
  return obj;
}

      render();
    });
  });
}

// ---- Usuario: enviar lote (manual o import) a revisión del admin ----
async function submitImportForReview(){
  const st=STATE.staged||[]; if(!st.length)return;
  const unresolved=st.filter(s=>s._dup && !s._dupAction);
  if(unresolved.length){ toast(`Resuelve ${unresolved.length} posible(s) duplicado(s) antes de enviar (⚠ en la tarjeta).`); return; }
  const payload=st.map(buildPayloadSong);
  const row={kind:'import', payload, collection_name:STATE.importCollName||null, collection_key:STATE.importCollKey||null,
    submitted_by:SESSION.user.id, submitter_name:PROFILE?.display_name||SESSION.user.email?.split("@")[0]||null,
    submitter_email:SESSION.user.email||null, status:'pending'};
  const {error}=await db.from("pending_imports").insert(row);
  if(error){
    if(error.message&&(error.message.includes("pending_imports")||error.message.includes("schema cache")||error.message.includes("does not exist"))){
      toast("⚠ El administrador aún no habilitó la revisión de importaciones.");
    } else { toast("Error al enviar: "+error.message); }
    return;
  }
  const n=payload.length;
  STATE.staged=null; STATE.importCollName=null; STATE.importCollKey=null; STATE.view="list"; STATE.tab="library";
  toast(`Cancionero enviado para revisión (${n} canción(es))`); render();
}

// ---- Admin: cargar un pending_imports en el flujo de revisión ----
function loadImportForReview(row){
  STATE.staged=JSON.parse(JSON.stringify(row.payload||[]));
  STATE.reviewMode="admin";
  STATE.reviewPendingId=row.id;
  STATE.reviewKind=row.kind;
  STATE.reviewSubmittedBy=row.submitted_by;
  STATE.reviewSubmitterName=row.submitter_name||"Usuario";
  STATE.reviewCollection={name:row.collection_name,key:row.collection_key};
  STATE.reviewEdited=false;
  STATE.view="review"; STATE.tab="library";
}
let IMPORT_ACTION_BUSY=false;
async function adminApproveImport(){
  if(IMPORT_ACTION_BUSY)return; IMPORT_ACTION_BUSY=true;
  try{
    const st=STATE.staged||[]; if(!st.length){toast("No quedan canciones para aprobar");return;}
    let collKey=(STATE.reviewCollection&&STATE.reviewCollection.key)||"general";
    const collName=STATE.reviewCollection&&STATE.reviewCollection.name;
    if(collName){
      await db.from("collections").upsert({id:collKey,label:collName,created_by:STATE.reviewSubmittedBy||null});
      COLLECTIONS[collKey]=collName;
      if(!COLLECTIONS_ORDER.includes(collKey))COLLECTIONS_ORDER.push(collKey);
    }
    const rows=st.map(s=>{
      const obj=buildPayloadSong(s);
      return Object.assign({},obj,{coleccion:obj.coleccion||collKey||"general",is_base:false,hidden:false,created_by:SESSION.user.id});
    });
    const {data,error}=await db.from("songs").insert(rows).select();
    if(error){toast("Error al aprobar: "+error.message);return;}
    (data||[]).forEach(s=>{ SONGS[s.id]=s; });
    (data||[]).forEach(s=>logSongHistory(s.id, s.parent_song_id?'version_added':'import_approved', {title:s.title, from_import:STATE.reviewPendingId}));
    const newStatus=STATE.reviewEdited?"approved_with_changes":"approved";
    await db.from("pending_imports").update({status:newStatus,reviewed_at:new Date().toISOString(),reviewed_by:SESSION.user.id}).eq("id",STATE.reviewPendingId);
    const what=STATE.reviewKind==='manual'?'canción':'importación';
    createNotification(STATE.reviewSubmittedBy,'import_approved','pending_imports',STATE.reviewPendingId,
      `Tu ${what} "${collName||(rows[0]&&rows[0].title)||''}" fue aprobada (${rows.length} canción(es)).`);
    PENDING_IMPORTS=PENDING_IMPORTS.filter(p=>String(p.id)!==String(STATE.reviewPendingId));
    PENDING_IMPORT_COUNT=PENDING_IMPORTS.length;
    STATE.staged=null; STATE.reviewMode="submit"; STATE.reviewPendingId=null; STATE.view="list"; STATE.tab="library";
    toast(`${rows.length} canción(es) publicada(s)`); render();
  } finally { IMPORT_ACTION_BUSY=false; }
}
async function adminRejectImport(){
  if(IMPORT_ACTION_BUSY)return; IMPORT_ACTION_BUSY=true;
  try{
    const note=(window.prompt("Motivo del rechazo (lo verá quien hizo el envío):")||"").trim();
    const {error}=await db.from("pending_imports").update({status:'rejected',review_note:note||null,reviewed_at:new Date().toISOString(),reviewed_by:SESSION.user.id}).eq("id",STATE.reviewPendingId);
    if(error){toast("Error al rechazar: "+error.message);return;}
    const what=STATE.reviewKind==='manual'?'canción':'importación';
    createNotification(STATE.reviewSubmittedBy,'import_rejected','pending_imports',STATE.reviewPendingId,
      `Tu ${what} "${(STATE.reviewCollection&&STATE.reviewCollection.name)||''}" fue rechazada.${note?(' Motivo: '+note):''}`);
    PENDING_IMPORTS=PENDING_IMPORTS.filter(p=>String(p.id)!==String(STATE.reviewPendingId));
    PENDING_IMPORT_COUNT=PENDING_IMPORTS.length;
    STATE.staged=null; STATE.reviewMode="submit"; STATE.reviewPendingId=null; STATE.view="list"; STATE.tab="library";
    toast("Envío rechazado"); render();
  } finally { IMPORT_ACTION_BUSY=false; }
}

// ---- Admin: panel con la lista de canciones nuevas / importaciones pendientes ----
function openPendingImportsPanel(){
  if(!isAdmin())return;
  if(!PENDING_IMPORTS.length){
    openModal(`<div class="modal-head"><h3>Canciones nuevas e importaciones</h3>${closeBtn()}</div>
    <div class="modal-body"><div class="empty" style="padding:40px 0"><div class="big">Sin pendientes</div><div>No hay canciones nuevas ni cancioneros esperando revisión.</div></div></div>`);
    return;
  }
  let html=`<div class="modal-head"><h3>Canciones nuevas e importaciones <span class="pending-badge">${PENDING_IMPORTS.length}</span></h3>${closeBtn()}</div><div class="modal-body">`;
  PENDING_IMPORTS.forEach(p=>{
    const n=(p.payload||[]).length;
    const title=p.kind==='manual'?((p.payload&&p.payload[0]&&p.payload[0].title)||"Canción nueva"):(p.collection_name||"Cancionero sin nombre");
    const date=p.created_at?new Date(p.created_at).toLocaleDateString("es-CL"):"";
    const by=p.submitter_name||"Usuario";
    html+=`<div class="pending-rev-card">
      <div class="pending-rev-title">${p.kind==='manual'?'🎵 ':'📚 '}${esc(title)}${p.kind==='import'?` <span style="font-weight:400;color:var(--faint)">(${n} canción${n!==1?'es':''})</span>`:""}</div>
      <div class="pending-rev-meta">Enviado por <b>${esc(by)}</b> · ${date}</div>
      <div class="pending-rev-actions">
        <button class="btn sm" data-review="${esc(p.id)}">Revisar</button>
        <button class="btn sm primary" data-quickapprove="${esc(p.id)}">✓ Aprobar tal cual</button>
        <button class="btn sm danger" data-quickreject="${esc(p.id)}">✕ Rechazar</button>
      </div>
    </div>`;
  });
  html+=`</div>`;
  openModal(html);

  document.querySelectorAll("[data-review]").forEach(b=>b.onclick=()=>{
    const row=PENDING_IMPORTS.find(p=>String(p.id)===String(b.dataset.review));
    if(!row)return;
    closeModal(); loadImportForReview(row); window.scrollTo(0,0); render();
  });
  document.querySelectorAll("[data-quickapprove]").forEach(b=>b.onclick=async()=>{
    const row=PENDING_IMPORTS.find(p=>String(p.id)===String(b.dataset.quickapprove));
    if(!row)return;
    if(!confirm(`¿Aprobar y publicar tal cual fue enviado (${(row.payload||[]).length} canción(es))?`))return;
    loadImportForReview(row);
    await adminApproveImport();
    closeModal();
    if(PENDING_IMPORTS.length)openPendingImportsPanel();
  });
  document.querySelectorAll("[data-quickreject]").forEach(b=>b.onclick=async()=>{
    const row=PENDING_IMPORTS.find(p=>String(p.id)===String(b.dataset.quickreject));
    if(!row)return;
    loadImportForReview(row);
    await adminRejectImport();
    closeModal();
    if(PENDING_IMPORTS.length)openPendingImportsPanel();
  });
}

function renderNotificationsPanel(){

      await db.from("notifications").update({read:true}).eq("id",nid);
    }
  });
}

async function loadSharedData(){
  const [songsRes, collsRes, linksRes, cmtsRes, visitsRes] = await Promise.all([
    db.from("songs").select("*").eq("hidden",false).order("title"),
    db.from("collections").select("*").order("created_at"),
    db.from("song_links").select("*"),
    db.from("song_comments").select("*").order("created_at"),
    db.from("song_visits").select("song_id,visit_count").then(r=>r).catch(()=>({data:[],error:null}))
  ]);
  SONGS={};
  for(const s of songsRes.data||[]) SONGS[s.id]=s;
  // Sort collections by sort_order if available (column may not exist in older DBs)
  const rawColls = (collsRes.data||[]);
  const hasSortOrder = rawColls.length>0 && rawColls[0].sort_order!=null;
  const sortedColls = hasSortOrder
    ? rawColls.slice().sort((a,b)=>(a.sort_order??999)-(b.sort_order??999))
    : rawColls;
  COLLECTIONS={general:"General"};
  COLLECTIONS_ORDER=["general"];
  for(const c of sortedColls){
    COLLECTIONS[c.id]=c.label;
    if(!COLLECTIONS_ORDER.includes(c.id)) COLLECTIONS_ORDER.push(c.id);
  }
  // Múltiples links por canción
  LINKS={};
  for(const l of linksRes.data||[]){
    if(!LINKS[l.song_id])LINKS[l.song_id]=[];
    LINKS[l.song_id].push(l);
  }
  COMMENTS={};
  for(const c of cmtsRes.data||[]){ if(!COMMENTS[c.song_id])COMMENTS[c.song_id]=[]; COMMENTS[c.song_id].push(c); }
  // Visitas
  VISITS={};
  for(const v of visitsRes.data||[]) VISITS[v.song_id]=v.visit_count;
}

// Registra una visita (anónima, fire-and-forget; cuenta tengas o no sesión)
function trackVisit(id){
  VISITS[id]=(VISITS[id]||0)+1;
  db.rpc("increment_visit",{song_id_param:id}).then(({error})=>{
    if(!error)return;
    console.error("[song_visits] RPC increment_visit falló, usando respaldo:",error.message);

      .then(({error:e2})=>{ if(e2) console.error("[song_visits] respaldo también falló:",e2.message); });

// Renderiza la barra alfabética lateral (solo en vista de lista con 20+ canciones)
function renderAlphaBar(ids){
  const bar=document.getElementById("alphaBar");
  if(!bar)return;
  if(!ids||ids.length<20||STATE.view!=="list"||!!STATE.activeList||!!STATE.query||STATE.topVisited){
    bar.classList.remove("show");
    bar.innerHTML="";
    return;
  }
  // Letras presentes en el conjunto actual
  const present=new Set();
  ids.forEach(id=>{
    const s=effective(id);
    if(!s)return;
    const fl=norm((s.title||"")[0]||"").toUpperCase();
    if(fl&&/[A-Z]/.test(fl))present.add(fl);
  });
  const allLetters="ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
  bar.innerHTML=allLetters.map(l=>`<span class="alpha-letter${present.has(l)?"":" dim"}" ${present.has(l)?`onclick="jumpToAlphaLetter('${l}')"`:""}>${l}</span>`).join("");
  bar.classList.add("show");
  setupAlphaBarHover();
}

// Ir a la primera canción de una letra
function jumpToAlphaLetter(letter){
  const anchor=document.getElementById("alpha-anchor-"+letter);
  if(anchor){
    const top=anchor.getBoundingClientRect().top+window.scrollY-90;
    window.scrollTo({top,behavior:"smooth"});
  }
}

// Efecto de lupa en la alpha bar (escritorio + touch)
function setupAlphaBarHover(){
  const bar=document.getElementById("alphaBar");
  if(!bar||bar._hoverSet)return;
  bar._hoverSet=true;

  bar.addEventListener("mousemove",(e)=>{
    const letters=[...bar.querySelectorAll(".alpha-letter:not(.dim)")];
    letters.forEach(l=>{
      const lCenter=l.getBoundingClientRect().top+l.getBoundingClientRect().height/2;
      const dist=Math.abs(e.clientY-lCenter);
      const maxDist=55;
      if(dist<maxDist){
        const s=1+(1-dist/maxDist)*1.6;
        l.style.transform=`scale(${s.toFixed(2)})`;
        l.style.color=dist<12?"var(--ink)":"var(--muted)";
        l.style.fontWeight=dist<20?"800":"700";
      } else {
        l.style.transform="";
        l.style.color="";
        l.style.fontWeight="";
      }
    });
  });
  bar.addEventListener("mouseleave",()=>{
    bar.querySelectorAll(".alpha-letter").forEach(l=>{
      l.style.transform="";l.style.color="";l.style.fontWeight="";
    });
  });
  // Touch: arrastrar en la barra para navegar
  bar.addEventListener("touchmove",(e)=>{
    e.preventDefault();
    const touch=e.touches[0];
    const el=document.elementFromPoint(touch.clientX,touch.clientY);
    if(el&&el.classList.contains("alpha-letter")&&!el.classList.contains("dim")){
      const letter=el.textContent.trim();
      const anchor=document.getElementById("alpha-anchor-"+letter);
      if(anchor){
        const top=anchor.getBoundingClientRect().top+window.scrollY-90;
        window.scrollTo({top});
      }
    }
  },{passive:false});
}

// ---- Diff entre canción original y una sugerencia (edit_data) ----
function flattenSongSections(secs){
  const out=[];
  (secs||[]).forEach(sec=>(sec||[]).forEach(ln=>out.push({lyric:ln.lyric||"",chords:ln.chords||""})));
  return out;
}
function pendingFieldDiffRow(label,oldVal,newVal){
  const o=oldVal||"", n=newVal||"";
  if(o===n) return "";
  return `${label}: <span style="text-decoration:line-through;opacity:.6">${esc(o||"—")}</span> → <b style="color:var(--indigo)">${esc(n||"—")}</b><br>`;
}
function pendingSectionsDiffHtml(origSecs,newSecs){
  const a=flattenSongSections(origSecs), b=flattenSongSections(newSecs);
  const max=Math.max(a.length,b.length);
  let rows="", changed=0;
  for(let i=0;i<max;i++){
    const oa=a[i]||{lyric:"",chords:""}, ob=b[i]||{lyric:"",chords:""};
    if(oa.lyric!==ob.lyric || oa.chords!==ob.chords){
      changed++;
      rows+=`<div style="margin:4px 0;padding:6px 8px;background:var(--surface-2);border-radius:6px">
        <div style="text-decoration:line-through;opacity:.55">${esc(oa.chords)} ${esc(oa.lyric)}</div>
        <div style="color:var(--indigo);font-weight:600">${esc(ob.chords)} ${esc(ob.lyric)}</div>
      </div>`;
    }
  }
  if(!changed) return "";
  return `<div style="margin-top:6px"><b>Letra/acordes</b> (${changed} línea${changed>1?"s":""} modificada${changed>1?"s":""}):${rows}</div>`;
}
function buildPendingDiffHtml(s,editData){
  let out="";
  out+=pendingFieldDiffRow("Título", s.title, editData.title);
  const origCatsArr=catsOf(s)||[], newCatsArr=editData.categorias||[];
  if(origCatsArr.slice().sort().join(",")!==newCatsArr.slice().sort().join(",")){
    out+=`Categorías: <span style="text-decoration:line-through;opacity:.6">${esc(origCatsArr.map(catLabel).join(", ")||"—")}</span> → <b style="color:var(--indigo)">${esc(newCatsArr.map(catLabel).join(", ")||"—")}</b><br>`;
  }
  out+=pendingFieldDiffRow("Colección", collLabel(collOf(s)), editData.coleccion?collLabel(editData.coleccion):"");
  out+=pendingFieldDiffRow("Cejillo", String(s.capo||0), String(editData.capo||0));
  out+=pendingFieldDiffRow("Créditos", s.credits, editData.credits);
  out+=pendingSectionsDiffHtml(s.sections, editData.sections);
  return out || "<i>Sin cambios detectados respecto al original.</i>";
}
